<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テンプレート選択ガイド | わん一級建築士塾</title>
<style>
  :root {
    --teal: #0D9488;
    --teal-light: #14B8A6;
    --teal-bg: #F0FDFA;
    --navy: #1E3A5F;
    --navy-light: #2D5A8E;
    --white: #FFFFFF;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --wood-green: #10B981;
    --wood-green-light: #D1FAE5;
    --wood-green-border: #6EE7B7;
    --rc-orange: #F59E0B;
    --rc-orange-light: #FEF3C7;
    --rc-orange-border: #FCD34D;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #F0FDFA 0%, #EFF6FF 50%, #F0FDFA 100%);
    min-height: 100vh;
    color: var(--gray-800);
    line-height: 1.6;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header .badge {
    display: inline-block;
    background: var(--navy);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--gray-600);
    font-weight: 500;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--gray-200);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--teal), var(--navy));
  }

  /* Step view */
  .step {
    display: none;
    animation: fadeIn 0.35s ease;
  }
  .step.active {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .question {
    font-size: 19px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 20px;
    line-height: 1.45;
  }
  .question-note {
    font-size: 13px;
    color: var(--gray-600);
    margin-top: -12px;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  /* Choice buttons */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 16px 18px;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    background: var(--white);
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover {
    border-color: var(--teal);
    background: var(--teal-bg);
  }
  .choice-btn:active {
    transform: scale(0.98);
  }
  .choice-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .choice-icon.teal { background: var(--teal-bg); }
  .choice-icon.green { background: var(--wood-green-light); }
  .choice-icon.orange { background: var(--rc-orange-light); }
  .choice-icon.navy { background: #E8EEF5; }
  .choice-text { flex: 1; }
  .choice-sub {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--gray-600);
    margin-top: 2px;
  }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: var(--gray-100);
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: var(--gray-200);
    color: var(--gray-800);
  }

  /* Result card */
  .result-card {
    border-radius: 14px;
    padding: 24px 20px;
    margin-bottom: 16px;
  }
  .result-card.wood {
    background: linear-gradient(135deg, var(--wood-green-light), #ECFDF5);
    border: 2px solid var(--wood-green-border);
  }
  .result-card.rc {
    background: linear-gradient(135deg, var(--rc-orange-light), #FFFBEB);
    border: 2px solid var(--rc-orange-border);
  }
  .result-template-name {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .result-card.wood .result-template-name { color: #065F46; }
  .result-card.rc .result-template-name { color: #92400E; }
  .result-struct-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 14px;
  }
  .result-card.wood .result-struct-badge {
    background: var(--wood-green);
    color: var(--white);
  }
  .result-card.rc .result-struct-badge {
    background: var(--rc-orange);
    color: var(--white);
  }

  .result-specs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .spec-item {
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .spec-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    margin-bottom: 2px;
  }
  .spec-value {
    font-size: 16px;
    font-weight: 800;
    color: var(--gray-800);
  }

  .result-vol {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
  }
  .result-vol-icon {
    font-size: 18px;
  }

  .result-note {
    margin-top: 14px;
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.6;
    padding: 10px 14px;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .actions button {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-restart {
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .btn-restart:hover {
    background: var(--gray-200);
    color: var(--gray-800);
  }

  /* Path breadcrumb */
  .path {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 16px;
  }
  .path-item {
    font-size: 11px;
    font-weight: 600;
    color: var(--teal);
    background: var(--teal-bg);
    padding: 3px 10px;
    border-radius: 6px;
  }
  .path-arrow {
    font-size: 11px;
    color: var(--gray-400);
    line-height: 22px;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--gray-200);
  }
  .footer-logo {
    font-size: 14px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .footer-sub {
    font-size: 11px;
    color: var(--gray-400);
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 32px; }
    .card { padding: 22px 16px; }
    .header h1 { font-size: 19px; }
    .question { font-size: 17px; }
    .choice-btn { padding: 14px 14px; font-size: 14px; }
    .result-specs { grid-template-columns: 1fr 1fr; gap: 8px; }
    .result-template-name { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">MASTER ROAD #09</div>
    <h1>あなたの敷地に合う<br>テンプレートは？</h1>
    <p class="subtitle">ボリューム検討マスターへの道 #09 テンプレート選択ガイド</p>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="card" id="cardArea">
    <!-- Steps are rendered by JS -->
  </div>

  <div class="footer">
    <div class="footer-logo">わん一級建築士塾</div>
    <div class="footer-sub">土地から新築に本気で挑む不動産投資家のために</div>
  </div>
</div>

<script>
(function() {
  // ---- Data ----
  const templates = {
    A: { name: 'テンプレート A', struct: '木造OK', structType: 'wood', width: '間口 6,500mm', area: '約80㎡', units: '2戸', vol: '#09 基本形で登場', note: '間口が狭くても2戸なら成立しやすい基本パターン。木造で建築コストを抑えられます。' },
    B: { name: 'テンプレート B', struct: 'RC', structType: 'rc', width: '間口 6,700mm', area: '約95㎡', units: '3戸', vol: '#09 基本形で登場', note: 'RCで3戸を確保。間口が狭い敷地でも容積率を活かしやすい構成です。' },
    C: { name: 'テンプレート C', struct: '木造OK', structType: 'wood', width: '間口 8,200mm', area: '約110㎡', units: '3戸', vol: '#09 基本形で登場', note: '奥行きが短めでも3戸取れる木造プラン。コストバランスに優れます。' },
    D: { name: 'テンプレート D', struct: 'RC', structType: 'rc', width: '間口 8,200mm', area: '約140㎡', units: '4戸', vol: '#09 基本形で登場', note: '奥行き16m以上あれば4戸のRC。収益性を最大化したい方向けです。' },
    E: { name: 'テンプレート E（基本形）', struct: '木造OK', structType: 'wood', width: '間口 8,700mm', area: '約70㎡', units: '2戸', vol: '#09 基本形で登場', note: '最も汎用性の高い基本テンプレート。まずはここから検討を始めましょう。' },
    F: { name: 'テンプレート F', struct: 'RC', structType: 'rc', width: '間口 11,000mm', area: '約95㎡', units: '3戸', vol: '#09 基本形で登場', note: '広めの間口を活かしたRC3戸プラン。各住戸の採光・通風を確保しやすい配置です。' },
    G: { name: 'テンプレート G', struct: '木造OK', structType: 'wood', width: '間口 11,550mm', area: '約110㎡', units: '3戸', vol: '#09 基本形で登場', note: '間口が広い敷地で木造3戸。建築コストを抑えながら戸数を確保できます。' },
    H: { name: 'テンプレート H', struct: '木造OK', structType: 'wood', width: '角地対応', area: '〜65㎡', units: '2戸', vol: '#09 基本形で登場', note: 'コンパクトな角地でも成立する2戸プラン。2面接道のメリットを活かせます。' },
    I: { name: 'テンプレート I', struct: '木造OK', structType: 'wood', width: '角地・正方形寄り', area: '〜95㎡', units: '3戸', vol: '#09 基本形で登場', note: '正方形に近い角地向け。木造で3戸を効率的に配置します。' },
    J: { name: 'テンプレート J', struct: 'RC', structType: 'rc', width: '角地・横長', area: '〜95㎡', units: '3戸', vol: '#09 基本形で登場', note: '横長の角地向けRCプラン。道路面を広く使える配置です。' },
    K: { name: 'テンプレート K', struct: '木造OK', structType: 'wood', width: '角地・大型', area: '125㎡〜', units: '4戸', vol: '#09 基本形で登場', note: '大型角地のポテンシャルを最大限に活かす4戸プラン。木造でコストも抑えられます。' },
  };

  // ---- Step definitions ----
  // Each step: { id, label, question, note?, choices: [{ text, sub?, icon, iconClass, next|result }] }
  const steps = {
    start: {
      id: 'start', label: 'STEP 1', question: 'あなたの敷地はどっち？',
      choices: [
        { text: '1面道路', sub: '前面道路が1つ', icon: '🛣️', iconClass: 'teal', next: 'frontage' },
        { text: '角地（2面道路）', sub: '2つの道路に接している', icon: '🔀', iconClass: 'navy', next: 'corner_size' },
      ]
    },
    frontage: {
      id: 'frontage', label: 'STEP 2', question: '敷地の間口は？',
      note: 'テンプレートEの基本間口（8,700mm）が目安です',
      choices: [
        { text: '8.7m 未満', sub: '狭めの間口', icon: '📐', iconClass: 'teal', next: 'narrow_units' },
        { text: '8.7m 以上', sub: '広めの間口', icon: '📏', iconClass: 'teal', next: 'wide_struct' },
      ]
    },
    narrow_units: {
      id: 'narrow_units', label: 'STEP 3', question: '何戸ほしい？',
      choices: [
        { text: '2戸でいい', sub: 'シンプルに2戸で検討', icon: '2️⃣', iconClass: 'teal', next: 'narrow_2_struct' },
        { text: '3戸以上ほしい', sub: '収益性を重視', icon: '3️⃣', iconClass: 'teal', next: 'narrow_3_depth' },
        { text: 'テンプレート E が成立する', sub: '間口8,700mm / 約70㎡ / 基本形', icon: '⭐', iconClass: 'green', result: 'E' },
      ]
    },
    narrow_2_struct: {
      id: 'narrow_2_struct', label: 'STEP 4', question: '間口が小さめで奥行きがある場合、構造は？',
      choices: [
        { text: '木造（1階にも住戸を入れる）', sub: '2戸/フロア・間口6,500mm', icon: '🪵', iconClass: 'green', result: 'A' },
        { text: 'RC（1階に通路を通す）', sub: '3戸/フロア・間口6,700mm', icon: '🏗️', iconClass: 'orange', result: 'B' },
      ]
    },
    narrow_3_depth: {
      id: 'narrow_3_depth', label: 'STEP 4', question: '敷地の奥行きは？',
      choices: [
        { text: '〜13m', sub: '奥行き短め', icon: '↕️', iconClass: 'teal', result: 'C' },
        { text: '16m 以上', sub: '奥行きに余裕あり', icon: '↕️', iconClass: 'teal', result: 'D' },
      ]
    },
    wide_struct: {
      id: 'wide_struct', label: 'STEP 3', question: '3戸取れそう？構造は？',
      choices: [
        { text: '木造で 3戸', sub: 'コストを抑えて3戸確保', icon: '🪵', iconClass: 'green', result: 'G' },
        { text: 'RC で 3戸', sub: '容積率を活かして3戸', icon: '🏗️', iconClass: 'orange', result: 'F' },
      ]
    },
    corner_size: {
      id: 'corner_size', label: 'STEP 2', question: '敷地のサイズは？',
      choices: [
        { text: 'コンパクト（〜65㎡）', sub: '小さめの角地', icon: '🏠', iconClass: 'teal', result: 'H' },
        { text: '中型（〜95㎡）', sub: '中くらいの角地', icon: '🏘️', iconClass: 'teal', next: 'corner_mid_shape' },
        { text: '大型（125㎡〜）', sub: '広い角地', icon: '🏢', iconClass: 'teal', result: 'K' },
      ]
    },
    corner_mid_shape: {
      id: 'corner_mid_shape', label: 'STEP 3', question: '敷地の形は？',
      choices: [
        { text: '正方形寄り / 木造', sub: '整形地で木造3戸', icon: '⬜', iconClass: 'green', result: 'I' },
        { text: '横長 / RC', sub: '横長敷地でRC3戸', icon: '▬', iconClass: 'orange', result: 'J' },
      ]
    },
  };

  // ---- State ----
  let history = []; // stack of step ids
  let currentStepId = 'start';
  let pathLabels = []; // breadcrumb labels

  const cardArea = document.getElementById('cardArea');
  const progressFill = document.getElementById('progressFill');

  // Max depth for progress
  const maxDepth = 4;

  function updateProgress() {
    const pct = Math.min((history.length / maxDepth) * 100, 100);
    progressFill.style.width = pct + '%';
  }

  function renderStep(stepId) {
    const step = steps[stepId];
    if (!step) return;
    currentStepId = stepId;
    updateProgress();

    let html = '';

    // Back button
    if (history.length > 0) {
      html += '<button class="back-btn" onclick="app.goBack()">← 戻る</button>';
    }

    // Path breadcrumb
    if (pathLabels.length > 0) {
      html += '<div class="path">';
      pathLabels.forEach(function(label, i) {
        if (i > 0) html += '<span class="path-arrow">›</span>';
        html += '<span class="path-item">' + label + '</span>';
      });
      html += '</div>';
    }

    html += '<div class="step active">';
    html += '<div class="step-label">' + step.label + '</div>';
    html += '<div class="question">' + step.question + '</div>';
    if (step.note) {
      html += '<div class="question-note">' + step.note + '</div>';
    }
    html += '<div class="choices">';
    step.choices.forEach(function(c, idx) {
      html += '<button class="choice-btn" onclick="app.choose(' + idx + ')">';
      html += '<div class="choice-icon ' + c.iconClass + '">' + c.icon + '</div>';
      html += '<div class="choice-text">' + c.text;
      if (c.sub) html += '<span class="choice-sub">' + c.sub + '</span>';
      html += '</div>';
      html += '</button>';
    });
    html += '</div></div>';

    cardArea.innerHTML = html;
  }

  function renderResult(templateKey) {
    const t = templates[templateKey];
    if (!t) return;
    progressFill.style.width = '100%';

    const cardClass = t.structType === 'wood' ? 'wood' : 'rc';

    let html = '';
    html += '<button class="back-btn" onclick="app.goBack()">← 戻る</button>';

    // Path
    if (pathLabels.length > 0) {
      html += '<div class="path">';
      pathLabels.forEach(function(label, i) {
        if (i > 0) html += '<span class="path-arrow">›</span>';
        html += '<span class="path-item">' + label + '</span>';
      });
      html += '</div>';
    }

    html += '<div class="step active">';
    html += '<div class="step-label">RESULT</div>';
    html += '<div class="question">おすすめテンプレート</div>';

    html += '<div class="result-card ' + cardClass + '">';
    html += '<div class="result-template-name">' + t.name + '</div>';
    html += '<div class="result-struct-badge">' + t.struct + '</div>';

    html += '<div class="result-specs">';
    html += '<div class="spec-item"><div class="spec-label">間口 / 配置</div><div class="spec-value">' + t.width + '</div></div>';
    html += '<div class="spec-item"><div class="spec-label">敷地面積</div><div class="spec-value">' + t.area + '</div></div>';
    html += '<div class="spec-item"><div class="spec-label">戸数</div><div class="spec-value">' + t.units + '</div></div>';
    html += '<div class="spec-item"><div class="spec-label">構造</div><div class="spec-value">' + t.struct + '</div></div>';
    html += '</div>';

    html += '<div class="result-vol"><span class="result-vol-icon">📖</span> 実践編 ' + t.vol + '</div>';

    if (t.note) {
      html += '<div class="result-note">' + t.note + '</div>';
    }

    html += '</div>'; // result-card

    html += '<div class="actions">';
    html += '<button class="btn-restart" onclick="app.restart()">最初からやり直す</button>';
    html += '</div>';

    html += '</div>';

    cardArea.innerHTML = html;
  }

  // ---- Public API ----
  window.app = {
    choose: function(idx) {
      var step = steps[currentStepId];
      if (!step) return;
      var choice = step.choices[idx];
      if (!choice) return;

      // Push to history
      history.push(currentStepId);
      pathLabels.push(choice.text);

      if (choice.result) {
        renderResult(choice.result);
      } else if (choice.next) {
        renderStep(choice.next);
      }
    },
    goBack: function() {
      if (history.length === 0) return;
      var prevStepId = history.pop();
      pathLabels.pop();
      renderStep(prevStepId);
    },
    restart: function() {
      history = [];
      pathLabels = [];
      renderStep('start');
    }
  };

  // ---- Init ----
  renderStep('start');
})();
</script>
</body>
</html>
